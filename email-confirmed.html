<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email confirmed — Nomad</title>
<meta name="description" content="Your Nomad email is confirmed. Head back to the app to finish signing in." />
<meta name="robots" content="noindex"/>
<link rel="canonical" href="https://nomadai.us/email-confirmed" />
<link rel="icon" type="image/jpeg" href="/app-icon.jpg" />
<link rel="apple-touch-icon" href="/app-icon.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600..900;1,9..144,600..900&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a201a;
  --bg-darker:#141911;
  --bark:#2a241c;
  --bark-hi:#332b22;
  --sand:#e8d5b7;
  --sand-dim:#c8b89a;
  --muted:#8a8275;
  --faint:#5a5248;
  --clay:#c4825e;
  --clay-soft:rgba(196,130,94,0.14);
  --clay-line:rgba(196,130,94,0.32);
  --clay-ink:#1a1408;
  --moss:#8aac7a;
  --line:rgba(232,213,183,0.10);
  --ease-out:cubic-bezier(.22,.61,.36,1);
}
/* Light (parchment) palette — mirrors the iOS app's light theme.
   Auto-applies via prefers-color-scheme. */
@media (prefers-color-scheme: light){
  :root{
    --bg:#f1e9d3;
    --bg-darker:#e8dec3;
    --bark:#ede1c5;
    --bark-hi:#e4d7b8;
    --sand:#22312a;
    --sand-dim:#4d5a52;
    --muted:#7c7468;
    --faint:#a89e8d;
    --clay:#9c5b3a;
    --clay-soft:rgba(156,91,58,0.14);
    --clay-line:rgba(156,91,58,0.32);
    --clay-ink:#fff5e6;
    --moss:#4a7246;
    --line:rgba(34,49,42,0.10);
  }
  .hero{
    background:
      radial-gradient(ellipse at 50% 0%, rgba(156,91,58,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(156,91,58,0.05) 0%, transparent 60%),
      var(--bg);
  }
  .logo-mark{box-shadow:0 6px 18px rgba(156,91,58,0.18);}
  .btn-primary{box-shadow:0 6px 24px rgba(156,91,58,0.22);}
  .btn-primary:hover{box-shadow:0 8px 32px rgba(156,91,58,0.35);}
  .medallion::after{border:1px solid rgba(156,91,58,0.18);}
}
html,body{height:100%}
body{
  font-family:'Inter Tight','-apple-system',BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--sand);
  display:flex;flex-direction:column;min-height:100vh;
  font-feature-settings:'ss01' 1;letter-spacing:-0.005em;
}

/* ───── Logo header ───── */
.logo-row{padding:28px 24px 0;display:flex;justify-content:center}
.logo{
  display:inline-flex;align-items:center;gap:10px;
  font-weight:700;font-size:16px;color:var(--sand);
  text-decoration:none;letter-spacing:0;
}
.logo-mark{
  width:30px;height:30px;border-radius:8px;object-fit:cover;display:block;
  box-shadow:0 6px 18px rgba(196,130,94,0.22);
}

/* ───── Hero ───── */
.hero{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 24px 72px;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(196,130,94,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(196,130,94,0.06) 0%, transparent 60%),
    var(--bg);
}

/* ───── Check medallion ───── */
.medallion{
  width:96px;height:96px;border-radius:50%;
  background:var(--clay-soft);
  border:1.5px solid var(--clay-line);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
  animation:pop .55s var(--ease-out) both;
  position:relative;
}
.medallion::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(196,130,94,0.18);
  animation:ring 1.4s var(--ease-out) .4s both;
}
@keyframes pop{
  0%{opacity:0;transform:scale(.65)}
  60%{transform:scale(1.06)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes ring{
  0%{opacity:0;transform:scale(.85)}
  100%{opacity:1;transform:scale(1.1)}
}
.medallion svg{
  width:44px;height:44px;stroke:var(--clay);
  stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;
}

/* ───── Type ───── */
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:600;color:var(--muted);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:24px;
}
.eyebrow::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--moss);animation:pulse 1.6s infinite var(--ease-out);
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

h1{
  font-family:'Fraunces','Cochin','Times New Roman',serif;font-optical-sizing:auto;
  font-size:clamp(38px,7vw,62px);font-weight:600;line-height:1.06;
  letter-spacing:-0.02em;color:var(--sand);max-width:680px;margin-bottom:22px;
}
h1 em{color:var(--clay);font-style:italic;font-weight:600}

.sub{
  font-size:clamp(15px,1.55vw,17px);color:var(--sand-dim);
  max-width:480px;line-height:1.65;margin-bottom:42px;
}

/* ───── CTAs ───── */
.cta-row{display:flex;flex-direction:column;align-items:center;gap:14px}
.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--clay);color:var(--clay-ink);
  padding:15px 30px;border-radius:999px;
  font-weight:700;font-size:14px;letter-spacing:.01em;text-decoration:none;
  box-shadow:0 6px 24px rgba(196,130,94,0.26);
  transition:transform .25s var(--ease-out),box-shadow .25s var(--ease-out);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(196,130,94,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.btn-secondary{
  color:var(--sand-dim);text-decoration:none;font-size:13px;font-weight:600;
  padding:10px 14px;transition:color .2s;
}
.btn-secondary:hover{color:var(--sand)}

/* ───── Hint ───── */
.hint{
  margin-top:34px;font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--faint);max-width:380px;line-height:1.7;
}

/* ───── Footer ───── */
footer{
  padding:28px 24px;text-align:center;font-size:13px;color:var(--sand-dim);
  border-top:1px solid var(--line);
}
footer a{color:var(--sand);text-decoration:none;margin:0 12px;font-weight:600;transition:color .15s}
footer a:hover{color:var(--clay)}

@media (max-width: 480px){
  .hero{padding:32px 20px 56px}
  .medallion{width:84px;height:84px;margin-bottom:24px}
  .medallion svg{width:38px;height:38px}
}
@media (prefers-reduced-motion:reduce){
  .medallion,.medallion::after,.eyebrow::before{animation:none}
}
</style>
</head>
<body>

<div class="logo-row">
  <a class="logo" href="/">
    <img class="logo-mark" src="/app-icon.jpg" alt="Nomad app icon" width="30" height="30" />
    Nomad
  </a>
</div>

<section class="hero">
  <div class="medallion" aria-hidden="true">
    <svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>
  </div>

  <span class="eyebrow">Email confirmed</span>
  <h1>You're <em>all set.</em></h1>
  <p class="sub">
    Your email is verified. Head back to the Nomad app to finish signing in.
  </p>

  <div class="cta-row">
    <a class="btn-primary" href="nomadai://">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      Open Nomad
    </a>
    <a class="btn-secondary" href="/">Back to home</a>
  </div>

  <div class="hint">
    If the button doesn't open the app,<br>switch back to it manually.
  </div>
</section>

<footer>
  <a href="/privacy">Privacy</a>
  <a href="/terms">Terms</a>
  <a href="mailto:hello@nomadai.us">Contact</a>
</footer>

</body>
</html>
